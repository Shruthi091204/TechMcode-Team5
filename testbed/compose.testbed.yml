version: "3.8"

networks:
  rca_net:
    driver: bridge
    name: rca_net

services:
  lb-01:
    image: nginx:alpine
    container_name: lb-01
    cap_add:
      - NET_ADMIN
    networks:
      - rca_net
    ports:
      - "8080:80"
    command: >
      sh -c "echo 'server { listen 80; location / { proxy_pass http://web-01; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

  web-01:
    image: nginx:alpine
    container_name: web-01
    cap_add:
      - NET_ADMIN
    networks:
      - rca_net
    command: >
      sh -c "echo 'server { listen 80; location / { proxy_pass http://app-01:8000; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

  app-01:
    image: python:3.11-slim
    container_name: app-01
    cap_add:
      - NET_ADMIN
    networks:
      - rca_net
    # A tiny zero-dependency HTTP server that proxies a wait to the DB to simulate processing
    command: >
      python -c "
      import http.server, socketserver, urllib.request, time
      class Handler(http.server.SimpleHTTPRequestHandler):
          def do_GET(self):
              try:
                  urllib.request.urlopen('http://db-01:3306', timeout=2)
              except Exception:
                  pass
              self.send_response(200)
              self.end_headers()
              self.wfile.write(b'OK')
      socketserver.TCPServer(('0.0.0.0', 8000), Handler).serve_forever()
      "

  db-01:
    image: mysql:8.0
    container_name: db-01
    cap_add:
      - NET_ADMIN
    networks:
      - rca_net
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rca_db
    # We expose 3306 but don't strictly need a schema for link degradation
    
  loadgen:
    image: alpine
    container_name: loadgen
    networks:
      - rca_net
    # Fires 5 requests per second endlessly to establish a baseline
    command: >
      sh -c "apk add --no-cache curl && while true; do curl -s http://lb-01 > /dev/null; sleep 0.2; done"